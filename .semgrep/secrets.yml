rules:
  - id: hardcoded-stripe-live-key
    pattern: |
      $VAR = '$KEY'
    metavariable-regex:
      metavariable: $KEY
      regex: 'sk_live_[a-zA-Z0-9]{10,}'
    message: >
      Hardcoded Stripe live API key found in '$VAR'.
      Move this to environment variables or AWS Secrets Manager.
    languages: [javascript, typescript]
    severity: ERROR

  - id: hardcoded-api-key
    patterns:
      - pattern: const $VAR = '$VAL'
      - metavariable-regex:
          metavariable: $VAR
          regex: '.*(KEY|TOKEN|SECRET|PASSWORD|CREDENTIAL).*'
    message: >
      Hardcoded credential found in '$VAR'.
      Store secrets in environment variables or a secrets manager — never in source code.
    languages: [javascript, typescript]
    severity: ERROR
